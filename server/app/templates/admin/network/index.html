<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Network Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font:14px monospace;padding:16px}
h2{color:#58a6ff;margin:16px 0 8px;font-size:16px}
.section{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #21262d}
.row:last-child{border-bottom:none}
label{color:#8b949e}
select,input,button{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:6px 10px;border-radius:4px;font:14px monospace}
button{cursor:pointer;background:#238636;border-color:#238636;color:#fff;white-space:nowrap}
button.danger{background:#da3633;border-color:#da3633}
button.small{padding:2px 8px;font-size:12px}
button:hover{opacity:0.85}
.network-item{display:flex;align-items:center;gap:8px;padding:4px 0}
.signal{display:inline-block;width:40px;text-align:right;color:#d2991d}
.open{color:#3fb950}.wpa{color:#d2991d}
.toggle{width:48px;height:24px;border-radius:12px;border:none;cursor:pointer;transition:background 0.2s}
.toggle.off{background:#30363d}.toggle.on{background:#238636}
.connected{color:#3fb950}.disconnected{color:#f85149}
.badge{display:inline-block;padding:1px 8px;border-radius:8px;font-size:11px;font-weight:bold}
.badge.ap{background:#1f6feb;color:#fff}.badge.uplink{background:#238636;color:#fff}.badge.none{background:#30363d;color:#8b949e}
.pwd{display:flex;gap:8px;margin:8px 0;align-items:center}
#status-msg{padding:4px 0;font-size:12px;min-height:18px}
.iface-row{display:grid;grid-template-columns:1fr 70px 140px 130px;gap:8px;align-items:center;padding:4px 0}
input[type=range]{width:90px;vertical-align:middle}
</style>
</head>
<body>

<h2>Wi-Fi Adapters</h2>
<div class="section">
  <div id="iface-list">Loading...</div>
  <div style="margin-top:8px">
    <button onclick="restartServices()">Restart Services (hostapd + dnsmasq)</button>
    <span id="apply-msg" style="font-size:12px;margin-left:8px;color:#8b949e"></span>
  </div>
</div>

<h2>Uplink Status</h2>
<div class="section">
  <div class="row"><span>Status:</span> <span id="uplink-status" class="disconnected">-</span></div>
  <div class="row"><span>SSID:</span> <span id="uplink-ssid">-</span></div>
  <div class="row"><span>Interface:</span> <span id="uplink-iface">-</span></div>
  <div class="row"><span>IP:</span> <span id="uplink-ip">-</span></div>
  <div style="margin-top:12px">
    <button onclick="scanNetworks()">Scan</button>
    <button class="danger" onclick="disconnectWifi()" style="margin-left:8px">Disconnect</button>
  </div>
  <div id="networks-list" style="margin-top:8px"></div>
  <div id="connect-form" style="display:none;margin-top:8px">
    <div class="pwd">
      <input id="wifi-ssid" placeholder="SSID">
      <input id="wifi-password" type="password" placeholder="Password">
      <button onclick="connectWifi()">Connect</button>
    </div>
  </div>
  <div id="status-msg"></div>
</div>

<h2>User Internet Access</h2>
<div class="section">
  <div id="user-list">Loading...</div>
</div>

<script>
const BASE = window.location.origin;
let TOKEN = '';

function api(path, data) {
  if (data) return fetch(BASE + path, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...data, session_token:TOKEN})}).then(r=>r.json());
  return fetch(BASE + path + '?session_token=' + encodeURIComponent(TOKEN)).then(r=>r.json());
}

function init() {
  TOKEN = localStorage.getItem('lc_session_token') || '';
  if (!TOKEN) { document.body.innerHTML = 'No session. <a href="/">Login</a>'; return; }
  loadInterfaces();
  loadStatus();
  loadUsers();
}

async function loadInterfaces() {
  try {
    const r = await api('/admin/network/interfaces');
    document.getElementById('iface-list').innerHTML = r.items.map(i =>
      '<div class="iface-row"><span>' + i.ifname + ' <small style="color:#8b949e">' + (i.chipset||'') + '</small></span>' +
      '<span class="badge ' + i.role + '">' + i.role.toUpperCase() + '</span>' +
      '<span><input type="range" min="1" max="33" value="' + i.tx_power_dbm + '" onchange="setTxPower(\'' + i.ifname + '\',this)" title="' + i.tx_power_dbm + 'dBm"> <small>' + i.tx_power_dbm + 'dBm</small></span>' +
      '<span>' +
      '<button class="small" onclick="setRole(\'' + i.ifname + '\',\'ap\')">AP</button> ' +
      '<button class="small" onclick="setRole(\'' + i.ifname + '\',\'uplink\')">Uplink</button>' +
      '</span></div>'
    ).join('');
  } catch(e) { document.getElementById('iface-list').textContent = 'Error: ' + e; }
}

async function setTxPower(ifname, slider) {
  var dbm = parseInt(slider.value);
  try {
    await api('/admin/network/interfaces/txpower', {ifname: ifname, power_dbm: dbm});
    slider.title = dbm + 'dBm';
    slider.nextElementSibling.textContent = dbm + 'dBm';
  }
  catch(e) {}
}

async function setRole(ifname, role) {
  try {
    document.getElementById('apply-msg').textContent = 'Applying...';
    const r = await api('/admin/network/interfaces/assign', {ifname, role});
    loadInterfaces(); loadStatus();
    document.getElementById('apply-msg').textContent = r.items ? 'Services restarted on ' + r.items.filter(i=>i.role==='ap').map(i=>i.ifname)[0] : 'OK';
  }
  catch(e) { document.getElementById('apply-msg').textContent = 'Error: ' + e; }
}

async function restartServices() {
  try {
    document.getElementById('apply-msg').textContent = 'Restarting...';
    const r = await fetch(BASE + '/admin/network/services/restart?' + new URLSearchParams({session_token: TOKEN}), {method:'POST'}).then(r=>r.json());
    document.getElementById('apply-msg').textContent = r.status === 'ok' ? 'Restarted on ' + r.ap_interface : ('Error: ' + r.message);
  } catch(e) { document.getElementById('apply-msg').textContent = 'Error'; }
}

async function loadStatus() {
  try {
    const r = await api('/admin/network/wifi/status');
    document.getElementById('uplink-status').textContent = r.connected ? 'connected' : 'disconnected';
    document.getElementById('uplink-status').className = r.connected ? 'connected' : 'disconnected';
    document.getElementById('uplink-ssid').textContent = r.ssid || '-';
    document.getElementById('uplink-iface').textContent = r.interface || '-';
    document.getElementById('uplink-ip').textContent = r.ip_address || '-';
  } catch(e) {}
}

async function scanNetworks() {
  document.getElementById('status-msg').innerHTML = 'Scanning...';
  try {
    const r = await api('/admin/network/wifi/scan');
    document.getElementById('networks-list').innerHTML = r.networks.map(n =>
      '<div class="network-item"><span class="signal">' + n.signal + '%</span>' +
      '<span class="' + (n.security === 'open' ? 'open' : 'wpa') + '">' + n.ssid + '</span>' +
      '<button onclick="selectNetwork(\'' + n.ssid.replace(/'/g,"\\'") + '\',' + (n.security !== 'open') + ')">Connect</button></div>'
    ).join('');
    document.getElementById('status-msg').textContent = r.count + ' networks found';
  } catch(e) { document.getElementById('status-msg').textContent = 'Error: ' + e; }
}

function selectNetwork(ssid, needsPassword) {
  document.getElementById('connect-form').style.display = 'block';
  document.getElementById('wifi-ssid').value = ssid;
  document.getElementById('wifi-password').value = '';
  document.getElementById('wifi-password').placeholder = needsPassword ? 'Password' : 'open';
}

async function connectWifi() {
  const ssid = document.getElementById('wifi-ssid').value.trim(), password = document.getElementById('wifi-password').value;
  if (!ssid) return;
  document.getElementById('status-msg').textContent = 'Connecting...';
  try {
    const r = await api('/admin/network/wifi/connect', {ssid, password});
    document.getElementById('status-msg').textContent = r.connected ? 'Connected: ' + r.ip_address : 'Failed';
    document.getElementById('connect-form').style.display = 'none';
    loadStatus();
  } catch(e) { document.getElementById('status-msg').textContent = 'Error: ' + e; }
}

async function disconnectWifi() {
  try { await api('/admin/network/wifi/disconnect', {}); loadStatus(); }
  catch(e) {}
}

async function loadUsers() {
  try {
    const r = await api('/admin/network/users');
    document.getElementById('user-list').innerHTML = r.items.map(u =>
      '<div class="row"><span>' + u.login + ' <small style="color:#8b949e">' + u.role + '</small></span>' +
      '<button class="toggle ' + (u.internet_enabled ? 'on' : 'off') + '" onclick="toggleInternet(' + u.user_id + ',' + !u.internet_enabled + ')"></button></div>'
    ).join('') || 'No users';
  } catch(e) {}
}

async function toggleInternet(userId, enable) {
  try { await api('/admin/network/users/internet', {user_id: userId, enabled: enable}); loadUsers(); }
  catch(e) {}
}

init();
</script>
</body>
</html>
